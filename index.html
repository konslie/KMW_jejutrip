<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제주 여행 플래너</title>
    <!-- 외부 라이브러리 (Sortable, Kakao Maps) -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=41ffb381e0c7d6b03dba5cb7564a234e&libraries=services"></script>
    <!-- 스타일 -->
    <link rel="stylesheet" href="./src/style.css">
    <!-- 메인 로직 (ES Module 방식) -->
    <script type="module" src="./src/main.js"></script>
</head>
<body>

<header>
    <h1>🌴 제주 여행 플래너</h1>
</header>

<div id="map-wrapper">
    <div id="kakao-map">지도를 불러오는 중입니다...</div>
</div>

<div class="container">
    <div class="map-filter-container">
        <span class="map-filter-label">🗺️ 지도에 표시할 일정 보기</span>
        <div class="radio-group">
            <input type="radio" id="filter-all" name="map-filter" value="all" checked>
            <label for="filter-all">전체 일정</label>
            <input type="radio" id="filter-d1" name="map-filter" value="day1">
            <label for="filter-d1">1일차</label>
            <input type="radio" id="filter-d2" name="map-filter" value="day2">
            <label for="filter-d2">2일차</label>
            <input type="radio" id="filter-d3" name="map-filter" value="day3">
            <label for="filter-d3">3일차</label>
            <input type="radio" id="filter-d4" name="map-filter" value="day4">
            <label for="filter-d4">4일차</label>
        </div>
    </div>

    <div class="search-container">
        <div class="search-input-group">
            <input type="text" id="keyword" placeholder="추가 장소 검색 (예: 런던베이글)">
            <button class="search-btn" id="search-btn">검색</button>
            <button class="reset-btn" id="reset-btn">초기화</button>
        </div>
        <div id="search-results"></div>
    </div>

    <div id="itinerary-container"></div>
</div>

</body>
</html>
